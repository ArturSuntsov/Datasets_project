# CI/CD пайплайн для деплоя
# Запускается при merge в main ветку

name: CD - Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend

jobs:
  # =============================================================================
  # Build and Push Docker Images
  # =============================================================================
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      backend_tag: ${{ steps.meta-backend.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            latest

      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            latest

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =============================================================================
  # Deploy to Production
  # =============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment:
      name: production
      url: https://your-domain.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          # Копирование файлов на сервер
          scp -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            .env.example \
            $SERVER_USER@$SERVER_HOST:~/dataset-ai/

          # Выполнение команд на сервере
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST << 'EOF'
            cd ~/dataset-ai
            
            # Остановка старых контейнеров
            docker-compose -f docker-compose.prod.yml down
            
            # Pull новых образов
            docker-compose -f docker-compose.prod.yml pull
            
            # Запуск новых контейнеров
            docker-compose -f docker-compose.prod.yml up -d
            
            # Очистка старых образов
            docker image prune -af --filter "until=24h"
            
            # Проверка здоровья сервисов
            docker-compose -f docker-compose.prod.yml ps
          EOF

      - name: Health check
        run: |
          # Проверка доступности сервиса
          curl -f https://your-domain.com/health || exit 1
          curl -f https://your-domain.com/api/ || exit 1

  # =============================================================================
  # Notify
  # =============================================================================
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()

    steps:
      - name: Send success notification
        if: needs.deploy-production.result == 'success'
        run: |
          echo "✅ Deploy successful to production!"
          # Здесь можно добавить отправку в Slack/Telegram

      - name: Send failure notification
        if: needs.deploy-production.result == 'failure'
        run: |
          echo "❌ Deploy failed!"
          # Здесь можно добавить отправку в Slack/Telegram
