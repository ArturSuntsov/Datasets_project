version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: dataset_ai_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-dataset_ai}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: dataset_ai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dataset_ai_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Важно: имя хоста из Compose, а не localhost
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
    depends_on:
      - mongodb
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: sh -c "python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dataset_ai_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  mongo_data:

