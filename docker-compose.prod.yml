# Production Docker Compose конфигурация
# 
# Используется для деплоя на production сервере.
# Включает:
# - Gunicorn для backend
# - Nginx для static files и reverse proxy
# - Оптимизированные настройки производительности
# - SSL/HTTPS поддержку

version: '3.9'

services:
  # Nginx - Reverse Proxy и статические файлы
  nginx:
    image: nginx:alpine
    container_name: dataset_ai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - dataset_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend - Django + Gunicorn
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: dataset_ai_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Production настройки
      - DEBUG=0
      - DJANGO_SETTINGS_MODULE=config.settings
      # Переопределяем хосты для Docker сети
      - MONGODB_HOST=mongodb
      - REDIS_HOST=redis
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/staticfiles:/app/staticfiles
      - ./backend/logs:/app/logs
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn config.wsgi:application 
             --bind 0.0.0.0:8000 
             --workers 4 
             --threads 2 
             --worker-class gthread 
             --timeout 120 
             --keep-alive 5 
             --access-logfile /app/logs/access.log 
             --error-logfile /app/logs/error.log"
    networks:
      - dataset_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: dataset_ai_celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DEBUG=0
      - DJANGO_SETTINGS_MODULE=config.settings
      - MONGODB_HOST=mongodb
      - REDIS_HOST=redis
    depends_on:
      - redis
      - backend
    volumes:
      - ./backend/logs:/app/logs
    command: >
      sh -c "celery -A config worker 
             --loglevel=info 
             --concurrency=4 
             --pool=gevent 
             --logfile=/app/logs/celery.log"
    networks:
      - dataset_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery Beat (Periodic Tasks)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: dataset_ai_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DEBUG=0
      - DJANGO_SETTINGS_MODULE=config.settings
      - MONGODB_HOST=mongodb
      - REDIS_HOST=redis
    depends_on:
      - redis
    command: celery -A config beat --loglevel=info
    networks:
      - dataset_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend - сборка и serving через Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: dataset_ai_frontend
    restart: unless-stopped
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - dataset_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MongoDB - База данных
  mongodb:
    image: mongo:7
    container_name: dataset_ai_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-dataset_ai}
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-}
    ports:
      - "127.0.0.1:27017:27017"  # Только localhost для безопасности
    volumes:
      - mongo_data:/data/db
      - ./mongodb/backup:/backup
    networks:
      - dataset_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis - Кэш и брокер сообщений
  redis:
    image: redis:7-alpine
    container_name: dataset_ai_redis
    restart: unless-stopped
    command: redis-server 
             --appendonly yes 
             --maxmemory 256mb 
             --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"  # Только localhost
    volumes:
      - redis_data:/data
    networks:
      - dataset_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Flower - мониторинг Celery (опционально)
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: dataset_ai_flower
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
      - celery
    command: celery -A config flower --port=5555
    ports:
      - "127.0.0.1:5555:5555"  # Только localhost
    networks:
      - dataset_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  dataset_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

# Secrets для чувствительных данных (опционально)
# secrets:
#   db_password:
#     external: true
#   jwt_secret:
#     external: true
